<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification Launch</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6fbff;
        --text: #102533;
        --muted: #55707f;
        --card: rgba(255, 255, 255, 0.94);
        --line: rgba(12, 78, 102, 0.18);
        --primary: #0e91b6;
        --accent: #ff7a45;
        --shadow: 0 14px 38px rgba(16, 37, 51, 0.12);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #06131b;
          --text: #d7ecf7;
          --muted: #95b7c8;
          --card: rgba(9, 27, 38, 0.9);
          --line: rgba(73, 137, 167, 0.28);
          --primary: #28b7df;
          --accent: #f2a85c;
          --shadow: 0 18px 44px rgba(0, 0, 0, 0.35);
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, color-mix(in srgb, var(--primary) 18%, transparent), transparent 48%),
          radial-gradient(circle at bottom left, color-mix(in srgb, var(--accent) 14%, transparent), transparent 42%),
          var(--bg);
        display: grid;
        place-items: center;
      }
      main {
        width: min(100%, 420px);
        padding: 18px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 18px;
        background: var(--card);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }
      .eyebrow {
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.73rem;
        color: var(--accent);
        font-weight: 700;
      }
      h1 {
        margin: 0;
        font-size: 1.55rem;
        line-height: 1.1;
      }
      p {
        margin: 12px 0 0;
        color: var(--muted);
        line-height: 1.45;
      }
      .status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 14px;
        background: color-mix(in srgb, var(--card) 86%, var(--primary) 14%);
        border: 1px solid color-mix(in srgb, var(--line) 78%, var(--primary) 22%);
      }
      .status strong {
        color: var(--text);
      }
      .actions {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }
      button {
        font: inherit;
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 11px 14px;
        cursor: pointer;
        font-weight: 700;
      }
      .primary {
        background: var(--primary);
        color: #fff;
      }
      .secondary {
        background: transparent;
        color: var(--text);
        border-color: var(--line);
      }
      .meta {
        margin-top: 14px;
        font-size: 0.86rem;
        color: var(--muted);
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <p class="eyebrow">Devvit Web</p>
        <h1>Verification Hub</h1>
        <p>Open the full hub to submit verification photos, check status, or review pending requests.</p>

        <div id="status-card" class="status">
          <strong id="status-title">Loading…</strong>
          <p id="status-copy">Checking your current verification state.</p>
        </div>

        <div class="actions">
          <button id="open-hub-btn" class="primary" type="button">Open Verification Hub</button>
          <button id="open-mod-btn" class="secondary hidden" type="button">Open Moderator Panel</button>
        </div>

        <p id="meta-line" class="meta">Loading post details…</p>
      </section>
    </main>

    <script type="module" src="index.js"></script>
  </body>
</html>
