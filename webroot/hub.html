<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification Hub</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f3fbff;
        --card: #ffffff;
        --text: #102533;
        --muted: #5c7382;
        --line: #c9dfeb;
        --primary: #0e91b6;
        --accent: #ff7a45;
        --danger: #ce4661;
        --success: #118b63;
        --shadow: 0 10px 26px rgba(6, 36, 52, 0.1);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #04131b;
          --card: #0a1c27;
          --text: #d7ecf7;
          --muted: #9cb9c8;
          --line: #214153;
          --primary: #23b3dc;
          --accent: #f2a85c;
          --danger: #ff6f86;
          --success: #45d6a6;
          --shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, color-mix(in srgb, var(--primary) 14%, transparent), transparent 48%),
          var(--bg);
      }
      .shell {
        max-width: 720px;
        margin: 0 auto;
        padding: 16px;
      }
      .loading-screen {
        min-height: 50vh;
        display: grid;
        place-items: center;
        color: var(--muted);
      }
      .card {
        background: color-mix(in srgb, var(--card) 92%, var(--bg) 8%);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: var(--shadow);
        margin-bottom: 14px;
      }
      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      h1,
      h2 {
        margin: 0;
      }
      h1 {
        font-size: clamp(1.2rem, 2vw, 1.7rem);
      }
      h2 {
        font-size: 1rem;
        color: var(--primary);
      }
      .meta {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }
      .status-line {
        margin: 12px 0 0;
        font-weight: 700;
      }
      .status-verified {
        color: var(--success);
      }
      .status-pending {
        color: var(--primary);
      }
      .status-danger,
      .status-blocked {
        color: var(--danger);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 28px;
        height: 28px;
        border-radius: 999px;
        background: var(--danger);
        color: #fff;
        font-size: 0.8rem;
        font-weight: 800;
        padding: 0 8px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 14px;
      }
      button,
      a.photo-link {
        font: inherit;
        border-radius: 12px;
        border: 1px solid transparent;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 700;
        text-decoration: none;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .btn-primary {
        background: var(--primary);
        color: #fff;
      }
      .btn-secondary {
        background: transparent;
        color: var(--text);
        border-color: var(--line);
      }
      .btn-danger {
        background: var(--danger);
        color: #fff;
      }
      .submission-box {
        margin-top: 14px;
        padding: 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: color-mix(in srgb, var(--card) 86%, var(--bg) 14%);
      }
      .submission-box p {
        margin: 0 0 8px;
      }
      .submission-box p:last-child {
        margin-bottom: 0;
      }
      .photo-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .info-msg {
        margin-top: 12px;
        color: var(--muted);
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div id="loading-screen" class="loading-screen">Loading Verification Hub…</div>

      <div id="main-content" class="hidden">
        <section class="card">
          <div class="card-header">
            <div>
              <h1>Verification Hub</h1>
              <p id="meta-subreddit" class="meta"></p>
              <p id="meta-username" class="meta"></p>
              <p id="meta-status" class="status-line"></p>
            </div>
            <div class="row" style="margin-top: 0">
              <span id="pending-badge" class="badge hidden"></span>
              <button id="refresh-btn" class="btn-secondary" type="button">Refresh</button>
            </div>
          </div>
          <div class="row">
            <button id="mod-panel-btn" class="btn-secondary hidden" type="button">Open Moderator Panel</button>
          </div>
        </section>

        <section class="card">
          <h2>Verification</h2>
          <p id="info-msg" class="info-msg hidden"></p>
          <div id="action-row" class="row"></div>
          <div id="submission-box" class="submission-box hidden"></div>
        </section>
      </div>
    </div>

    <script type="module" src="hub.js"></script>
  </body>
</html>
